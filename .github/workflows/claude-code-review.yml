name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to review"
        required: true
        type: string

concurrency:
  group: claude-review-${{ inputs.pr_number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Configure AI credentials
        uses: ./.github/actions/configure-ai
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          ollama_api_key: ${{ secrets.OLLAMA_API_KEY }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Resolve PR head SHA
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          sha=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)
          test -n "$sha"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Claude review
        uses: anthropics/claude-code-action@v1
        env:
          ANTHROPIC_BASE_URL: ${{ env.ANTHROPIC_BASE_URL }}
          ANTHROPIC_AUTH_TOKEN: ${{ env.ANTHROPIC_AUTH_TOKEN }}
          ANTHROPIC_DEFAULT_SONNET_MODEL: ${{ env.ANTHROPIC_DEFAULT_SONNET_MODEL }}
          ANTHROPIC_DEFAULT_OPUS_MODEL: ${{ env.ANTHROPIC_DEFAULT_OPUS_MODEL }}
          OLLAMA_API_KEY: ${{ env.OLLAMA_API_KEY }}
          OPENAI_API_KEY: ${{ env.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ env.OPENAI_BASE_URL }}
        with:
          claude_code_oauth_token: ${{ env.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            Review PR #${{ inputs.pr_number }} for raft-consensus.
            Read CLAUDE.md. Focus on Raft safety, module boundaries, and test coverage.
            Block if core algorithm changes lack tests or break `mvn test -DskipITs=true`.
          claude_args: |
            --model claude-opus-4-6
            --max-turns 8
            --allowedTools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(mvn:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
