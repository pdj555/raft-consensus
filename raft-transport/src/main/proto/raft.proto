syntax = "proto3";

package io.distributed.consensus.transport.proto;

option java_package = "io.distributed.consensus.transport.proto";
option java_multiple_files = true;

message NodeIdProto {
  string value = 1;
}

message LogEntryProto {
  int64 index = 1;
  int64 term = 2;
  bytes command = 3;
}

message RequestVoteRequestProto {
  NodeIdProto source = 1;
  NodeIdProto destination = 2;
  int64 term = 3;
  int64 last_log_index = 4;
  int64 last_log_term = 5;
}

message RequestVoteResponseProto {
  NodeIdProto source = 1;
  NodeIdProto destination = 2;
  int64 term = 3;
  bool vote_granted = 4;
}

message AppendEntriesRequestProto {
  NodeIdProto source = 1;
  NodeIdProto destination = 2;
  int64 term = 3;
  int64 prev_log_index = 4;
  int64 prev_log_term = 5;
  repeated LogEntryProto entries = 6;
  int64 leader_commit = 7;
}

message AppendEntriesResponseProto {
  NodeIdProto source = 1;
  NodeIdProto destination = 2;
  int64 term = 3;
  bool success = 4;
  int64 match_index = 5;
}

message RaftEnvelope {
  oneof payload {
    RequestVoteRequestProto request_vote_request = 1;
    RequestVoteResponseProto request_vote_response = 2;
    AppendEntriesRequestProto append_entries_request = 3;
    AppendEntriesResponseProto append_entries_response = 4;
  }
}
